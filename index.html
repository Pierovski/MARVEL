<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARVEL | Archivo Multiversal</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { marvel: 'var(--color-marvel)', glow: 'var(--color-glow)' },
                    fontFamily: { oswald: ['Oswald', 'sans-serif'], roboto: ['Roboto', 'sans-serif'] },
                    backgroundImage: { 'parallax': "url('https://www.transparenttextures.com/patterns/stardust.png')" }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --color-marvel: #dc2626; 
            --color-glow: rgba(220, 38, 38, 0.15);
        }
        
        body { background-color: #020617; background-attachment: fixed; }
        
        /* Ocultar barra de scroll para limpieza visual */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .tech-tooltip { position: relative; }
        .tech-tooltip:hover::after {
            content: attr(data-tip);
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95); color: #94a3b8; font-size: 0.7rem; font-family: 'Oswald', sans-serif;
            text-transform: uppercase; letter-spacing: 1px; padding: 4px 8px; border-radius: 4px;
            border: 1px solid var(--color-marvel); white-space: nowrap; z-index: 50;
        }

        .card-glow { transition: all 0.4s ease; background: linear-gradient(145deg, rgba(15,23,42,0.8) 0%, rgba(2,6,23,1) 100%); }
        .card-glow:hover { box-shadow: 0 0 20px -5px var(--color-marvel); border-color: var(--color-marvel); }
    </style>
</head>
<body class="bg-parallax text-slate-100 min-h-screen font-roboto antialiased selection:bg-marvel selection:text-white pb-24 overflow-x-hidden">
    
    <header class="bg-[#020617]/90 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50 transition-colors duration-500">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="font-oswald bg-marvel text-white font-bold tracking-wider px-3 py-1 text-xl rounded shadow-[0_0_15px_var(--color-glow)] uppercase transition-all duration-500">MARVEL</h1>
            
            <div class="flex items-center gap-4 text-xs font-medium text-slate-400">
                <div class="flex items-center gap-1.5" data-tip="Progreso Actual">
                    <i class="fa-solid fa-crosshairs text-marvel transition-colors duration-500"></i>
                    <span id="progress-stats" class="text-white font-oswald text-sm tracking-wide">0/0</span>
                </div>
                <div class="w-[1px] h-4 bg-slate-700"></div>
                <div class="flex items-center gap-1.5" data-tip="Tiempo de Visualización">
                    <i class="fa-regular fa-clock text-slate-500"></i>
                    <span id="time-stats" class="text-white font-oswald text-sm tracking-wide">0h 0m</span>
                </div>
            </div>
        </div>
    </header>

    <div class="sticky top-[52px] z-40 bg-[#020617]/95 backdrop-blur-md pt-4 pb-3 border-b border-slate-800/80">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex overflow-x-auto hide-scrollbar gap-6 snap-x mb-4">
                <button onclick="App.setSaga('all')" id="tab-saga-all" class="snap-start shrink-0 pb-1.5 text-sm font-oswald uppercase tracking-wider transition-all border-b-2">Universo Completo</button>
                <button onclick="App.setSaga('Infinito')" id="tab-saga-Infinito" class="snap-start shrink-0 pb-1.5 text-sm font-oswald uppercase tracking-wider transition-all border-b-2 border-transparent text-slate-500">Saga Infinito</button>
                <button onclick="App.setSaga('Multiverso')" id="tab-saga-Multiverso" class="snap-start shrink-0 pb-1.5 text-sm font-oswald uppercase tracking-wider transition-all border-b-2 border-transparent text-slate-500">Saga Multiverso</button>
            </div>

            <div class="flex justify-between items-center">
                <div class="flex items-center text-slate-400 hover:text-white transition-colors bg-slate-900/40 px-3 py-1.5 rounded-lg border border-slate-800/50">
                    <i class="fa-solid fa-arrow-down-short-wide text-[10px] mr-2 text-marvel"></i>
                    <select id="sort-select" onchange="App.setSortOrder(this.value)" class="bg-transparent text-[11px] font-medium focus:outline-none cursor-pointer appearance-none uppercase tracking-wide font-oswald">
                        <option value="narrative" class="bg-slate-900">Orden Narrativo</option>
                        <option value="release" class="bg-slate-900">Orden Estreno</option>
                    </select>
                </div>

                <div class="flex gap-1.5 overflow-x-auto hide-scrollbar">
                    <button onclick="App.setStatus('all')" id="btn-status-all" class="shrink-0 text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full transition-all">Todo</button>
                    <button onclick="App.setStatus('pending')" id="btn-status-pending" class="shrink-0 text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full transition-all">Pendientes</button>
                    <button onclick="App.setStatus('watched')" id="btn-status-watched" class="shrink-0 text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full transition-all">Vistas</button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-6 relative">
        <section id="movies-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></section>
    </main>

    <button onclick="App.toggleInventory()" data-tip="Bóveda de Artefactos" class="tech-tooltip fixed bottom-6 right-6 z-50 bg-amber-500 hover:bg-amber-400 text-slate-900 w-14 h-14 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.4)] flex items-center justify-center text-xl transition-all hover:scale-110 active:scale-95 border border-amber-300">
        <i class="fa-solid fa-vault"></i>
    </button>

    <div id="inventory-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-slate-950 border border-slate-800 rounded-2xl w-full max-w-2xl max-h-[80vh] flex flex-col shadow-2xl">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 rounded-t-2xl">
                <h2 class="font-oswald text-xl font-bold text-amber-500 uppercase tracking-wider"><i class="fa-solid fa-vault mr-2"></i> Bóveda Multiversal</h2>
                <button onclick="App.toggleInventory()" class="text-slate-500 hover:text-white text-xl transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 overflow-y-auto hide-scrollbar" id="inventory-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
